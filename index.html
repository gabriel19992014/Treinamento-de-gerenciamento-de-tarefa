<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Lista de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Minha Lista de Tarefas</h1>
    </header>

    <section class="form-section">
      <input type="text" id="tarefa" placeholder="Digite sua tarefa">
      <input type="text" id="descricao" placeholder="Digite a descrição da tarefa">
      <input type="date" id="data">
      <select id="prioridade">
        <option value="Urgente">Urgente</option>
        <option value="Importante">Importante</option>
        <option value="Normal" selected>Normal</option>
      </select>
      <button id="adicionar">Adicionar Tarefa</button>
    </section>

    <section class="list-section">
      <div id="dataArea" class="dataBox"></div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
